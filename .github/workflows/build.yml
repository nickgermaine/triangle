name: Triangle Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      tri_version: ${{ steps.get_ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get_ver
        run: |
          VER=$(grep 'PY_VERSION ' Include/patchlevel.h | cut -d'"' -f2)
          echo "version=$VER" >> $GITHUB_OUTPUT

  build:
    needs: extract-version
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: triangle-linux.tar.gz
          - os: windows-latest
            artifact_name: triangle-windows.zip
          - os: macos-latest
            artifact_name: triangle-macos.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # --- LINUX / MACOS BUILD STEPS ---
      - name: Build Unix (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ./configure --disable-gil --enable-optimizations
          make -j$(nproc || sysctl -n hw.ncpu)
          tar -czvf ${{ matrix.artifact_name }} triangle Lib/

      # --- WINDOWS BUILD STEPS ---
      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          ./PCbuild/build.bat -e -d
          Compress-Archive -Path PCbuild/amd64/*.exe, Lib/ -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binaries
          path: ${{ matrix.artifact_name }}

  create-github-release:
    needs: [extract-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.extract-version.outputs.tri_version }}-${{ github.run_number }}
          name: Triangle v${{ needs.extract-version.outputs.tri_version }}
          body: "Official Triangle Vibe Edition, built with triangles and vibes."
          files: |
            */triangle-linux.tar.gz
            */triangle-macos.tar.gz
            */triangle-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
